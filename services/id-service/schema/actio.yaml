# Actio — サービス固有ユーザーデータ
#
# Id Service のコアユーザーに紐づく Actio 固有フィールド。
# KVS キー: profile:{serviceId}:{userId}
#
# このファイルは npm run id:scan で自動生成可能。

version: "1"

service:
  id: actio
  name: Actio
  description: プラグインベースの予定 (Event) & タスク (Task) 管理プラットフォーム

fields:
  major:
    type: string
    description: 学科・専攻
    listVisible: true

  calendarAccessId:
    type: string
    description: Google Calendar 連携用 ID
