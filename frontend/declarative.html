<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2a6df4" />
    <title>Actio (declarative β)</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <style>
      /* Corpus renderer 用最小 CSS (Corpus 側 public/style.css 由来)。 */
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
             background: #0f1014; color: #eaecef; }
      .topbar { padding: 10px 16px; background: #14151a; border-bottom: 1px solid #2a2b30;
                display: flex; justify-content: space-between; align-items: center; }
      .topbar a { color: inherit; text-decoration: none; }
      .topbar .brand { font-weight: 600; }
      .content { padding: 16px; max-width: 720px; margin: 0 auto; }
      .corpus-panel-title { font-size: 1.2rem; margin: 0 0 8px; }
      .corpus-section { margin-bottom: 16px; padding: 12px; background: #1e1f24; border-radius: 8px; }
      .corpus-section-title { font-size: 0.95rem; margin: 0 0 8px; color: #a4adba; }
      .corpus-form-field { margin-bottom: 8px; display: block; }
      .corpus-form-field span { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #a4adba; }
      .corpus-form-field input, .corpus-form-field textarea, .corpus-form-field select {
        width: 100%; padding: 6px 8px; border-radius: 6px;
        border: 1px solid #3a3b40; background: #14151a; color: #eaecef;
      }
      .corpus-button { padding: 8px 12px; border-radius: 6px; border: 0;
        background: #2a6df4; color: #fff; cursor: pointer; }
      .corpus-button:hover { background: #3a7df8; }
      .corpus-list { list-style: none; padding: 0; margin: 0; }
      .corpus-list-item { padding: 8px; border-bottom: 1px solid #2a2b30; }
      .corpus-list-item:last-child { border-bottom: 0; }
      .corpus-list-title { font-weight: 600; }
      .corpus-list-subtitle, .corpus-list-meta, .corpus-list-body { color: #a4adba; font-size: 0.85rem; }
      .corpus-list-empty { color: #a4adba; font-style: italic; }
      .corpus-status { margin-top: 6px; font-size: 0.85rem; }
      .corpus-status.ok { color: #6ea96e; }
      .corpus-status.err { color: #d36f6f; }
      .hint { color: #a4adba; padding: 16px; }
      .hint.err { color: #d36f6f; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><a href="/">Actio</a> · declarative β</div>
      <span id="header-title"></span>
    </header>
    <main class="content">
      <div id="root"><p class="hint">読み込み中…</p></div>
    </main>
    <script type="module" src="/src/declarative.ts"></script>
  </body>
</html>
